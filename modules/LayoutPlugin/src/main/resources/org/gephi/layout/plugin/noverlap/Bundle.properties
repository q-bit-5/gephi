name=Noverlap
description=Just a repulsion force to prevent nodes overlap (not for the labels, though)

Noverlap.speed.name=Speed
Noverlap.speed.desc=Higher values make nodes move faster each iteration.

Noverlap.ratio.name=Ratio
Noverlap.ratio.desc=Multiplier applied to node sizes when computing collision boundaries.

Noverlap.margin.name=Margin
Noverlap.margin.desc=Extra spacing added around each node beyond its size.

Noverlap.seed.name=Random seed
Noverlap.seed.desc=Controls the random jitter applied when two nodes share the exact same position.