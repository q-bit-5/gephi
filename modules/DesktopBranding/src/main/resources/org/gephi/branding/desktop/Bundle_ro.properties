OutOfMemoryError.alreadyMax.message=Gephi a atins limita maxim\u0103 de memorie ({0}). Acest lucru se \u00EEnt\u00E2mpl\u0103 atunci c\u00E2nd volumul de date este prea mare. Limita este deja setat\u0103 la maxim.\n\nGephi va \u00EEncerca s\u0103 salveze proiectul \u00EEnainte de a ie\u0219i. Dac\u0103 este anulat, este probabil s\u0103 nu mai r\u0103spund\u0103.
