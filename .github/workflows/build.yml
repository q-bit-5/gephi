name: build

on:
  push:
    branches-ignore:
      - 0.11.3
      - weblate**

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build project with Maven
        run: mvn -T 4 --batch-mode -Djava.awt.headless=true verify -P enableCheckStyle
